<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthLens AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 320px;
            min-height: 200px;
            background: #03020a;
            color: #f1f0ff;
            font-family: 'Segoe UI', sans-serif;
        }

        .header {
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            padding: 16px;
            text-align: center;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .content {
            padding: 16px;
        }

        .status-card {
            background: #0d0b1a;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            text-align: center;
        }

        .status-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .status-text {
            font-size: 14px;
            font-weight: 700;
        }

        .status-sub {
            font-size: 11px;
            color: #6b7280;
            margin-top: 4px;
        }

        .analyze-btn {
            width: 100%;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .analyze-btn:hover {
            opacity: 0.9;
        }

        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .open-btn {
            width: 100%;
            background: transparent;
            color: #7c3aed;
            border: 1px solid #7c3aed;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }

        .signals {
            margin-top: 12px;
        }

        .signal-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 12px;
        }

        .signal-score {
            font-weight: 700;
        }

        .real { color: #10b981; }
        .fake { color: #ef4444; }
        .sus  { color: #f59e0b; }

        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .progress {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #06b6d4);
            border-radius: 2px;
            transition: width 0.3s;
        }

        .footer {
            padding: 8px 16px;
            text-align: center;
            font-size: 10px;
            color: #6b7280;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>🔍 TruthLens AI</h1>
        <p>Deepfake Detection Extension</p>
    </div>

    <!-- Content -->
    <div class="content">

        <!-- Status Card -->
        <div class="status-card" id="statusCard">
            <div class="status-icon" id="statusIcon">🔍</div>
            <div class="status-text" id="statusText">Ready to Analyze</div>
            <div class="status-sub" id="statusSub">Click analyze to check current page video</div>
            <div class="progress" id="progressBar" style="display:none">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
        </div>

        <!-- Signals (hidden initially) -->
        <div class="signals" id="signalsDiv" style="display:none">
            <div class="signal-row">
                <span>🎵 SyncNet</span>
                <span class="signal-score" id="sig-syncnet">—</span>
            </div>
            <div class="signal-row">
                <span>🎨 Texture</span>
                <span class="signal-score" id="sig-texture">—</span>
            </div>
            <div class="signal-row">
                <span>👁️ Blink</span>
                <span class="signal-score" id="sig-blink">—</span>
            </div>
            <div class="signal-row">
                <span>👄 Lip Reader</span>
                <span class="signal-score" id="sig-lip">—</span>
            </div>
            <div class="signal-row">
                <span>🎙️ Voice Clone</span>
                <span class="signal-score" id="sig-voice">—</span>
            </div>
        </div>

        <!-- Buttons -->
        <button class="analyze-btn" id="analyzeBtn" onclick="analyzeCurrentPage()">
            🔍 Analyze Current Page
        </button>

        <button class="open-btn" onclick="openTruthLens()">
            🌐 Open TruthLens AI
        </button>

    </div>

    <!-- Footer -->
    <div class="footer">
        TruthLens AI v3.0 · 5-Signal Detection
    </div>

    <script src="popup.js"></script>
</body>
</html>
